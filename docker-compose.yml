version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: janaina_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: janaina
      POSTGRES_PASSWORD: janaina123
      POSTGRES_DB: janaina_modas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U janaina']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: janaina_redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis123', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
